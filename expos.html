<div class="container">
    <h1>Agenda des Expositions Photo</h1>
    <div id="agenda"></div>
</div>

<footer>
    Atelier Photo — Agenda des Expos
</footer>

<script>
    async function chargerExpos() {
        // Chemin ABSOLU pour GitHub Pages
        const response = await fetch("/atelier-photo/expos.json");
        const expos = await response.json();

        const container = document.getElementById("agenda");

        // Regroupement par mois
        const parMois = {};

        expos.forEach(expo => {
            const mois = new Date(expo.debut).toLocaleString("fr-FR", { month: "long", year: "numeric" });
            if (!parMois[mois]) parMois[mois] = [];
            parMois[mois].push(expo);
        });

        // Affichage
        for (const mois in parMois) {
            const section = document.createElement("section");
            section.innerHTML = `<h2>${mois.charAt(0).toUpperCase() + mois.slice(1)}</h2>`;

            parMois[mois].forEach(expo => {
                section.innerHTML += `
                    <p>
                        <strong>${expo.titre}</strong><br>
                        📍 ${expo.lieu}<br>
                        📅 ${expo.debut} → ${expo.fin}<br>
                        ✏️ ${expo.description}<br>
                        🔗 <a href="${expo.lien}" target="_blank">Site officiel</a>
